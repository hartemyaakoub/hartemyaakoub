name: Generate contribution snake

on:
  schedule:
    - cron: "0 3 * * *"  # Daily at 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVG (dark + light)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: hartemyaakoub
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#c2a35a&color_dots=#1a1612,#5a4a32,#a08550,#dec38c,#fff1c2
            dist/ocean.gif?color_snake=orange&color_dots=#bfd7ea,#69a297,#487481,#0b2545,#13315c

      - name: Push to "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
